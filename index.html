<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METCON — Dashboard Operativo</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e12;--s1:#151820;--s2:#1c2029;--s3:#252a35;--brd:#2a3040;--tx:#e2e5ea;--txd:#8892a0;--txm:#5c6370;--acc:#f59e0b;--accd:rgba(245,158,11,.12);--grn:#22c55e;--grnd:rgba(34,197,94,.12);--red:#ef4444;--redd:rgba(239,68,68,.12);--blu:#3b82f6;--blud:rgba(59,130,246,.12);--pur:#a855f7;--r:14px;--rs:8px;--f:'DM Sans',sans-serif;--m:'JetBrains Mono',monospace}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
.nav{position:sticky;top:0;z-index:100;background:rgba(12,14,18,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);padding:0 20px}
.nav-in{max-width:1100px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;flex-wrap:wrap;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--acc);border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:14px;color:#000}
.brand-txt{font-weight:700;font-size:15px}.brand-tag{color:var(--txd);font-weight:400;font-size:11px}
.brand-sub{font-size:10px;color:var(--txm)}
.filters{display:flex;gap:3px;background:var(--s1);border-radius:10px;padding:3px}
.fbtn{padding:7px 14px;border-radius:8px;font-size:12px;font-weight:500;color:var(--txd);cursor:pointer;border:none;background:none;font-family:var(--f);transition:.15s}
.fbtn.on{background:var(--acc);color:#000;font-weight:700}
.main{max-width:1100px;margin:0 auto;padding:20px 16px 60px}
.stats{display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:12px;margin-bottom:16px}
.stat{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:18px 20px}
.stat-l{font-size:11px;font-weight:600;color:var(--txd);text-transform:uppercase;letter-spacing:1px;display:flex;gap:6px;margin-bottom:4px}
.stat-v{font-size:30px;font-weight:700;font-family:var(--m);line-height:1}
.stat-s{font-size:12px;color:var(--txd);margin-top:4px}
.v-acc{color:var(--acc)}.v-grn{color:var(--grn)}.v-red{color:var(--red)}.v-blu{color:var(--blu)}
.card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:20px;margin-bottom:16px}
.card-sel{border-color:var(--acc)}
.sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--txd);margin-bottom:12px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.grid2{display:grid;grid-template-columns:repeat(auto-fit,minmax(340px,1fr));gap:16px}
.bar-row{display:flex;align-items:center;gap:12px;margin-bottom:8px;cursor:pointer}
.bar-label{width:110px;font-size:12px;font-weight:600;text-align:right;flex-shrink:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.bar-track{flex:1;height:26px;background:var(--s2);border-radius:6px;overflow:hidden;position:relative}
.bar-fill{height:100%;border-radius:6px;transition:width .5s;display:flex;align-items:center;justify-content:flex-end;padding-right:8px}
.bar-fill span{font-size:11px;font-weight:700;color:#000}
.bar-ext{position:absolute;top:50%;transform:translateY(-50%);font-size:11px;font-weight:700;color:var(--txd)}
.bar-sub{width:50px;font-size:11px;color:var(--txd);text-align:right;flex-shrink:0}
.badge{padding:3px 10px;border-radius:20px;font-size:11px;font-weight:700;letter-spacing:.3px}
.b-grn{background:var(--grnd);color:var(--grn)}.b-red{background:var(--redd);color:var(--red)}
.b-yel{background:var(--accd);color:var(--acc)}.b-blu{background:var(--blud);color:var(--blu)}
.alert{display:flex;align-items:flex-start;gap:12px;padding:12px 14px;border-radius:var(--rs);margin-bottom:6px}
.a-red{background:rgba(239,68,68,.08);border:1px solid rgba(239,68,68,.2)}
.a-grn{background:rgba(34,197,94,.08);border:1px solid rgba(34,197,94,.2)}
.a-yel{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)}
.a-icon{font-size:15px;flex-shrink:0}.a-text{font-size:13px;font-weight:500;line-height:1.4}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--brd)}
table{width:100%;border-collapse:collapse;font-size:13px}
thead{background:var(--s2)}
th{padding:10px 12px;text-align:left;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txd);white-space:nowrap}
td{padding:10px 12px;border-top:1px solid var(--brd);white-space:nowrap}
tr:hover td{background:rgba(245,158,11,.03)}
tr{cursor:pointer}
.detail-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:10px;margin-bottom:14px}
.detail-cell{text-align:center;padding:10px;background:var(--s2);border-radius:8px}
.detail-v{font-size:22px;font-weight:700;font-family:var(--m)}
.detail-l{font-size:11px;color:var(--txd)}
.close-btn{margin-top:12px;padding:6px 16px;background:var(--s2);border:1px solid var(--brd);border-radius:6px;color:var(--txd);font-size:12px;cursor:pointer;font-family:var(--f)}
.loading{text-align:center;padding:80px 20px;color:var(--txd)}
.spinner{width:36px;height:36px;border:3px solid var(--brd);border-top-color:var(--acc);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
.error{text-align:center;padding:60px 20px;color:var(--red)}
.refresh-btn{padding:8px 20px;background:var(--acc);color:#000;border:none;border-radius:var(--rs);font-weight:700;cursor:pointer;font-family:var(--f);font-size:13px;margin-left:10px}
.ts{font-size:11px;color:var(--txm);display:flex;align-items:center;gap:6px}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--txm)}
.hint{font-size:11px;color:var(--txm);text-align:center;margin-top:4px}
.analysis-grid{display:grid;grid-template-columns:1.5fr 1fr;gap:20px}
@media(max-width:700px){.analysis-grid{grid-template-columns:1fr}.grid2{grid-template-columns:1fr}}
</style>
</head>
<body>

<nav class="nav"><div class="nav-in">
  <div class="brand">
    <div class="brand-icon">M</div>
    <div>
      <div class="brand-txt">METCON <span class="brand-tag">S.A.S</span></div>
      <div class="brand-sub">Dashboard Operativo — Parque Industrial Norte</div>
    </div>
  </div>
  <div style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
    <div class="filters" id="filters"></div>
    <button class="refresh-btn" onclick="loadData()">↻ Actualizar</button>
  </div>
</div></nav>

<div class="main" id="app">
  <div class="loading"><div class="spinner"></div>Cargando datos desde Google Sheets...</div>
</div>

<script>
// ===== CONFIG =====
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0FDT0-f1cDd2TxdZFvshSSaGt695yONwM5djelOS5gwmD53D3nO_HHLOw_InMd4lleLgR6_DD46Fo/pub?gid=2140392490&single=true&output=csv';

let ALL_DATA = [];
let PERIOD = 'all';
let SEL_MAQ = null;

// ===== CSV PARSER =====
function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r['Fecha']);
}

function parseCSVLine(line) {
  const result = []; let current = ''; let inQuotes = false;
  for (let i = 0; i < line.length; i++) {
    const ch = line[i];
    if (ch === '"') { inQuotes = !inQuotes; }
    else if (ch === ',' && !inQuotes) { result.push(current); current = ''; }
    else { current += ch; }
  }
  result.push(current);
  return result;
}

function normalizeData(raw) {
  return raw.map(r => {
    const ht = parseFloat(r['Horas Totales']) || 0;
    const hn = parseFloat(r['Horas Netas']) || ht;
    return {
      fecha: r['Fecha'] || '',
      dia: r['Día'] || '',
      obra: r['Obra'] || '',
      maquina: r['Máquina'] || '',
      operador: r['Operador'] || '',
      inicio: r['Hora Inicio'] || '',
      fin: r['Hora Fin'] || '',
      hsTotales: ht,
      hsNetas: hn,
      huboParada: r['Hubo Parada'] || 'NO',
      motivoParada: r['Motivo Parada'] || '',
      viajes: parseInt(r['Viajes']) || 0,
      combustible: parseInt(r['Combustible (lts)']) || 0,
      obs: r['Observaciones'] || ''
    };
  });
}

// ===== LOAD DATA =====
async function loadData() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando datos desde Google Sheets...</div>';
  try {
    const resp = await fetch(CSV_URL + '&_t=' + Date.now());
    if (!resp.ok) throw new Error('HTTP ' + resp.status);
    const text = await resp.text();
    const raw = parseCSV(text);
    ALL_DATA = normalizeData(raw);
    render();
  } catch (e) {
    app.innerHTML = '<div class="error"><h2>Error cargando datos</h2><p>' + e.message + '</p><p style="margin-top:12px;color:var(--txd)">Verificá que la Sheet esté publicada como CSV.</p></div>';
  }
}

// ===== HELPERS =====
const fmt = n => typeof n === 'number' ? n.toLocaleString('es-AR', {maximumFractionDigits:1}) : n;
const pct = n => (n * 100).toFixed(0) + '%';
const colors = ['#f59e0b','#3b82f6','#22c55e','#ef4444','#a855f7','#06b6d4','#f97316','#ec4899'];

function getFiltered() {
  if (PERIOD === 'all') return ALL_DATA;
  const now = new Date();
  if (PERIOD === 'week') {
    const d = new Date(); d.setDate(d.getDate() - 7);
    return ALL_DATA.filter(r => r.fecha >= d.toISOString().split('T')[0]);
  }
  if (PERIOD === 'month') {
    const m = now.toISOString().slice(0, 7);
    return ALL_DATA.filter(r => r.fecha.startsWith(m));
  }
  return ALL_DATA;
}

// ===== RENDER =====
function render() {
  const data = getFiltered();
  const app = document.getElementById('app');

  // Filters
  document.getElementById('filters').innerHTML = [['all','Todo'],['month','Este mes'],['week','7 días']].map(([k,l]) =>
    `<button class="fbtn${PERIOD===k?' on':''}" onclick="PERIOD='${k}';SEL_MAQ=null;render()">${l}</button>`
  ).join('');

  if (data.length === 0) {
    app.innerHTML = `<div class="loading" style="padding:60px">
      <div style="font-size:48px;margin-bottom:16px">📋</div>
      <h2 style="color:var(--tx);margin-bottom:8px">Sin datos${PERIOD !== 'all' ? ' en este período' : ''}</h2>
      <p style="color:var(--txd)">${PERIOD !== 'all' ? 'Probá con otro filtro o ' : ''}Los datos van a aparecer acá cuando se carguen desde el formulario.</p>
    </div>`;
    return;
  }

  // Calcs
  const tDias = new Set(data.map(r => r.fecha)).size;
  const tHs = data.reduce((s,r) => s + r.hsNetas, 0);
  const tHsT = data.reduce((s,r) => s + r.hsTotales, 0);
  const tRot = data.filter(r => r.motivoParada === 'Rotura mecánica').length;
  const tPar = data.filter(r => r.huboParada === 'SI').length;
  const tComb = data.reduce((s,r) => s + r.combustible, 0);
  const prod = tHsT > 0 ? tHs / tHsT : 1;

  const bM = {};
  data.forEach(r => {
    if (!bM[r.maquina]) bM[r.maquina] = {d:new Set(),h:0,ht:0,rot:0,par:0,cb:0,mot:{},obs:[]};
    const m = bM[r.maquina]; m.d.add(r.fecha); m.h += r.hsNetas; m.ht += r.hsTotales;
    if (r.motivoParada==='Rotura mecánica') { m.rot++; m.obs.push({f:r.fecha,o:r.obs}); }
    if (r.huboParada==='SI') { m.par++; m.mot[r.motivoParada]=(m.mot[r.motivoParada]||0)+1; }
    m.cb += r.combustible;
  });

  const bO = {};
  data.forEach(r => {
    if (!bO[r.operador]) bO[r.operador] = {d:new Set(),h:0,rot:0};
    bO[r.operador].d.add(r.fecha); bO[r.operador].h += r.hsNetas;
    if (r.motivoParada==='Rotura mecánica') bO[r.operador].rot++;
  });

  const bMot = {};
  data.filter(r => r.huboParada==='SI' && r.motivoParada).forEach(r => {
    bMot[r.motivoParada] = (bMot[r.motivoParada]||0) + 1;
  });

  const mxM = Math.max(...Object.values(bM).map(m=>m.h), 1);
  const mxO = Math.max(...Object.values(bO).map(o=>o.h), 1);
  const mxP = Math.max(...Object.values(bMot), 1);

  // Alerts
  let alertsHtml = '';
  const sorted = [...data].sort((a,b) => b.fecha.localeCompare(a.fecha));
  const lastDate = sorted[0]?.fecha;
  if (lastDate) {
    const dd = Math.floor((new Date() - new Date(lastDate+'T12:00:00')) / 864e5);
    if (dd > 2) alertsHtml += `<div class="alert a-red"><span class="a-icon">🔴</span><span class="a-text">Datos desactualizados: último registro hace ${dd} días (${lastDate})</span></div>`;
    else alertsHtml += `<div class="alert a-grn"><span class="a-icon">✅</span><span class="a-text">Datos al día — Último registro: ${lastDate}</span></div>`;
  }
  if (tRot > 0) {
    const lr = data.filter(r=>r.motivoParada==='Rotura mecánica').slice(-1)[0];
    alertsHtml += `<div class="alert a-${tRot>5?'red':'yel'}"><span class="a-icon">🔧</span><span class="a-text">${tRot} roturas. Última: ${lr?.maquina} (${lr?.fecha}) — ${lr?.obs||'sin detalle'}</span></div>`;
  }
  Object.entries(bM).forEach(([n,m]) => {
    const dp = m.d.size>0 ? 1-m.rot/m.d.size : 1;
    if (dp < 0.8) alertsHtml += `<div class="alert a-red"><span class="a-icon">⚠️</span><span class="a-text">${n}: disponibilidad ${pct(dp)}. ${m.rot} roturas en ${m.d.size} días.</span></div>`;
  });
  const fs = data.filter(r=>r.motivoParada==='Sin combustible').length;
  if (fs > 0) alertsHtml += `<div class="alert a-yel"><span class="a-icon">⛽</span><span class="a-text">${fs} paradas por combustible. Coordinar con logística Metrovial.</span></div>`;

  // Bars HTML
  function barsHtml(entries, max, startColor) {
    return entries.map(([n,v,sub], i) => {
      const w = Math.max((v/max)*100, 2);
      const col = colors[(i+startColor)%colors.length];
      return `<div class="bar-row" onclick="SEL_MAQ='${n.replace(/'/g,"\\'")}';render()">
        <div class="bar-label">${n.length > 14 ? n.split(',')[0] : n}</div>
        <div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${col}">${w>18?`<span>${fmt(v)}</span>`:''}</div>${w<=18?`<span class="bar-ext" style="left:calc(${w}% + 8px)">${fmt(v)}</span>`:''}</div>
        <div class="bar-sub">${sub}</div>
      </div>`;
    }).join('');
  }

  // Paradas section
  let paradasHtml = '';
  if (Object.keys(bMot).length > 0) {
    const bars = Object.entries(bMot).sort((a,b)=>b[1]-a[1]).map(([m,ct]) => {
      const col = m==='Rotura mecánica'?'var(--red)':m==='Sin combustible'?'var(--acc)':'var(--blu)';
      const w = Math.max((ct/mxP)*100,2);
      return `<div class="bar-row"><div class="bar-label">${m}</div><div class="bar-track"><div class="bar-fill" style="width:${w}%;background:${col}">${w>18?`<span>${ct}</span>`:''}</div>${w<=18?`<span class="bar-ext" style="left:calc(${w}% + 8px)">${ct}</span>`:''}</div><div class="bar-sub">${ct}x</div></div>`;
    }).join('');
    
    paradasHtml = `<div class="card"><div class="sec"><span class="dot" style="background:var(--red)"></span>Análisis de Paradas</div>
      <div class="analysis-grid"><div>${bars}</div>
      <div style="font-size:13px;color:var(--txd);line-height:1.7">
        <div style="font-weight:700;color:var(--tx);margin-bottom:6px">Resumen</div>
        <div>Paradas totales: <b style="color:var(--tx)">${tPar}</b></div>
        <div>Horas perdidas: <b style="color:var(--red)">${fmt(tHsT-tHs)}h</b></div>
        <div>% improductivo: <b style="color:${prod<.9?'var(--red)':'var(--grn)'}">${pct(1-prod)}</b></div>
        ${fs>0?`<div style="margin-top:8px;padding:8px;background:var(--accd);border-radius:6px;color:var(--acc);font-size:12px;font-weight:600">⛽ ${fs} paradas por combustible evitables</div>`:''}
      </div></div></div>`;
  }

  // Detail panel
  let detailHtml = '';
  if (SEL_MAQ && bM[SEL_MAQ]) {
    const det = bM[SEL_MAQ]; const ds = det.d.size;
    const dp = ds > 0 ? 1 - det.rot/ds : 1;
    const cells = [
      ['Días', ds, 'v-blu'], ['Hs Netas', fmt(det.h), 'v-acc'],
      ['Roturas', det.rot, det.rot>3?'v-red':'v-grn'],
      ['Disponib.', ds>0?pct(dp):'-', dp<.85?'v-red':'v-grn'],
      ['Combustible', fmt(det.cb)+' lts', 'v-grn'],
      ['Hs/Día', ds>0?fmt(det.h/ds):'-', 'v-blu']
    ].map(([l,v,cl]) => `<div class="detail-cell"><div class="detail-v ${cl}">${v}</div><div class="detail-l">${l}</div></div>`).join('');
    
    let obsHtml = '';
    if (det.obs.length > 0) {
      obsHtml = `<div style="margin-top:12px"><div style="font-size:12px;font-weight:700;color:var(--red);margin-bottom:6px">Historial de roturas:</div>
        ${det.obs.slice(-5).map(o => `<div style="font-size:12px;color:var(--txd);padding:4px 0;border-bottom:1px solid var(--s2)"><b style="color:var(--tx)">${o.f}</b> — ${o.o}</div>`).join('')}</div>`;
    }
    
    detailHtml = `<div class="card card-sel"><div class="sec"><span class="dot" style="background:var(--acc)"></span>Detalle: ${SEL_MAQ}</div>
      <div class="detail-grid">${cells}</div>${obsHtml}
      <button class="close-btn" onclick="SEL_MAQ=null;render()">Cerrar detalle</button></div>`;
  }

  // Table
  let tblRows = '';
  Object.entries(bM).sort((a,b) => b[1].h - a[1].h).forEach(([n,m]) => {
    const ds = m.d.size; const dp = ds>0 ? 1-m.rot/ds : 1;
    const dpCl = dp>=.9?'b-grn':dp>=.7?'b-yel':'b-red';
    tblRows += `<tr onclick="SEL_MAQ='${n.replace(/'/g,"\\'")}';render()">
      <td style="font-weight:600">${n}</td><td>${ds}</td>
      <td style="font-family:var(--m);font-size:12px">${fmt(m.h)}</td>
      <td style="font-family:var(--m);font-size:12px">${ds>0?fmt(m.h/ds):'-'}</td>
      <td>${m.rot>0?`<span class="badge b-red">${m.rot}</span>`:'<span class="badge b-grn">0</span>'}</td>
      <td>${m.par>0?`<span class="badge b-yel">${m.par}</span>`:'<span class="badge b-grn">0</span>'}</td>
      <td><span class="badge ${dpCl}">${pct(dp)}</span></td>
      <td style="font-family:var(--m);font-size:12px">${fmt(m.cb)} lts</td></tr>`;
  });

  // Assemble
  app.innerHTML = `
    <div class="ts" style="margin-bottom:12px">
      <span>📡 ${ALL_DATA.length} registros cargados desde Google Sheets</span>
      <span>· Última actualización: ${new Date().toLocaleTimeString('es-AR')}</span>
    </div>

    <div class="stats">
      <div class="stat"><div class="stat-l"><span>📊</span>Registros</div><div class="stat-v v-acc">${data.length}</div><div class="stat-s">${tDias} días trabajados</div></div>
      <div class="stat"><div class="stat-l"><span>⏱</span>Horas Máquina</div><div class="stat-v v-blu">${fmt(tHs)}</div><div class="stat-s">productividad ${pct(prod)}</div></div>
      <div class="stat"><div class="stat-l"><span>🔧</span>Roturas</div><div class="stat-v v-red">${tRot}</div><div class="stat-s">${tPar} paradas total</div></div>
      <div class="stat"><div class="stat-l"><span>⛽</span>Combustible</div><div class="stat-v v-grn">${fmt(tComb)}</div><div class="stat-s">litros consumidos</div></div>
    </div>

    ${alertsHtml ? `<div class="card">${alertsHtml}</div>` : ''}

    <div class="grid2">
      <div class="card"><div class="sec"><span class="dot" style="background:var(--acc)"></span>Horas por Máquina</div>
        ${barsHtml(Object.entries(bM).sort((a,b)=>b[1].h-a[1].h).map(([n,m])=>[n,m.h,m.d.size+'d']), mxM, 0)}
        <div class="hint">Clic en una barra para ver detalle</div></div>
      <div class="card"><div class="sec"><span class="dot" style="background:var(--grn)"></span>Horas por Operador</div>
        ${barsHtml(Object.entries(bO).sort((a,b)=>b[1].h-a[1].h).map(([n,o])=>[n,o.h,o.d.size+'d']), mxO, 2)}</div>
    </div>

    ${paradasHtml}
    ${detailHtml}

    <div class="card" style="overflow-x:auto"><div class="sec"><span class="dot" style="background:var(--blu)"></span>Tabla Resumen por Máquina</div>
      <div class="tbl-wrap"><table><thead><tr>
        <th>Máquina</th><th>Días</th><th>Hs Netas</th><th>Hs/Día</th><th>Roturas</th><th>Paradas</th><th>Disponib.</th><th>Combustible</th>
      </tr></thead><tbody>${tblRows}</tbody></table></div></div>

    <div class="footer">METCON S.A.S — Dashboard Operativo · ${data.length} registros · Datos en tiempo real desde Google Sheets</div>
  `;
}

// ===== INIT =====
loadData();
// Auto-refresh every 5 minutes
setInterval(loadData, 300000);
</script>
</body>
