<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>METCON — Logística de Maquinaria</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:opsz,wght@9..40,400;9..40,500;9..40,700&family=JetBrains+Mono:wght@400;600&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#0c0e12;--s1:#151820;--s2:#1c2029;--brd:#2a3040;--tx:#e2e5ea;--txd:#8892a0;--txm:#5c6370;--acc:#f59e0b;--grn:#22c55e;--grnd:rgba(34,197,94,.12);--red:#ef4444;--redd:rgba(239,68,68,.12);--blu:#3b82f6;--blud:rgba(59,130,246,.12);--r:14px;--rs:8px;--f:'DM Sans',sans-serif;--m:'JetBrains Mono',monospace}
body{font-family:var(--f);background:var(--bg);color:var(--tx);min-height:100vh}
.nav{position:sticky;top:0;z-index:100;background:rgba(12,14,18,.9);backdrop-filter:blur(20px);border-bottom:1px solid var(--brd);padding:0 20px}
.nav-in{max-width:900px;margin:0 auto;display:flex;align-items:center;justify-content:space-between;height:56px;gap:10px}
.brand{display:flex;align-items:center;gap:10px}
.brand-icon{width:34px;height:34px;background:var(--red);border-radius:9px;display:grid;place-items:center;font-weight:700;font-size:14px;color:#fff}
.brand-txt{font-weight:700;font-size:15px}.brand-sub{font-size:10px;color:var(--txm)}
.refresh{padding:8px 16px;background:var(--acc);color:#000;border:none;border-radius:var(--rs);font-weight:700;cursor:pointer;font-family:var(--f);font-size:13px}
.main{max-width:900px;margin:0 auto;padding:20px 16px 60px}
.card{background:var(--s1);border:1px solid var(--brd);border-radius:var(--r);padding:20px;margin-bottom:14px}
.card-alert{border-color:var(--red)}
.sec{font-size:12px;font-weight:700;text-transform:uppercase;letter-spacing:1.2px;color:var(--txd);margin-bottom:14px;display:flex;align-items:center;gap:8px}
.dot{width:8px;height:8px;border-radius:50%;display:inline-block}
.maq-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:12px}
.maq-card{background:var(--s2);border:1px solid var(--brd);border-radius:12px;padding:16px;transition:.2s}
.maq-card:hover{border-color:var(--txd)}
.maq-card.alert{border-color:var(--red);background:rgba(239,68,68,.04)}
.maq-card.warn{border-color:var(--acc);background:rgba(245,158,11,.04)}
.maq-name{font-weight:700;font-size:14px;margin-bottom:10px;display:flex;justify-content:space-between;align-items:center}
.maq-status{font-size:10px;font-weight:700;padding:2px 8px;border-radius:10px}
.st-ok{background:var(--grnd);color:var(--grn)}.st-warn{background:rgba(245,158,11,.12);color:var(--acc)}.st-bad{background:var(--redd);color:var(--red)}.st-service{background:var(--blud);color:var(--blu)}
.maq-row{display:flex;justify-content:space-between;align-items:center;padding:5px 0;font-size:12px;border-bottom:1px solid rgba(42,48,64,.5)}
.maq-row:last-child{border:none}
.maq-label{color:var(--txd)}.maq-val{font-weight:600;font-family:var(--m);font-size:11px}
.maq-val.danger{color:var(--red)}.maq-val.warn{color:var(--acc)}.maq-val.ok{color:var(--grn)}
.alert-box{display:flex;align-items:flex-start;gap:10px;padding:12px 14px;border-radius:var(--rs);margin-bottom:6px;font-size:13px;font-weight:500;line-height:1.4}
.a-red{background:var(--redd);border:1px solid rgba(239,68,68,.2)}.a-yel{background:rgba(245,158,11,.08);border:1px solid rgba(245,158,11,.2)}.a-grn{background:var(--grnd);border:1px solid rgba(34,197,94,.2)}.a-blu{background:var(--blud);border:1px solid rgba(59,130,246,.2)}
.comb-bar{height:8px;border-radius:4px;background:var(--s1);overflow:hidden;margin-top:4px}
.comb-fill{height:100%;border-radius:4px;transition:width .4s}
.tbl-wrap{overflow-x:auto;border-radius:var(--r);border:1px solid var(--brd)}
table{width:100%;border-collapse:collapse;font-size:12px}
thead{background:var(--s2)}th{padding:10px 12px;text-align:left;font-size:10px;font-weight:700;text-transform:uppercase;letter-spacing:.8px;color:var(--txd);white-space:nowrap}
td{padding:8px 12px;border-top:1px solid var(--brd);white-space:nowrap}
.loading{text-align:center;padding:60px;color:var(--txd)}
.spinner{width:32px;height:32px;border:3px solid var(--brd);border-top-color:var(--red);border-radius:50%;animation:spin .8s linear infinite;margin:0 auto 12px}
@keyframes spin{to{transform:rotate(360deg)}}
.footer{text-align:center;margin-top:24px;font-size:11px;color:var(--txm)}
.badge{padding:2px 8px;border-radius:10px;font-size:10px;font-weight:700}
.b-red{background:var(--redd);color:var(--red)}.b-grn{background:var(--grnd);color:var(--grn)}.b-yel{background:rgba(245,158,11,.12);color:var(--acc)}
</style>
</head>
<body>
<nav class="nav"><div class="nav-in">
  <div class="brand">
    <div class="brand-icon">🔧</div>
    <div><div class="brand-txt">METCON — Logística</div><div class="brand-sub">Panel de mantenimiento de maquinaria</div></div>
  </div>
  <button class="refresh" onclick="loadData()">↻ Actualizar</button>
</div></nav>
<div class="main" id="app"><div class="loading"><div class="spinner"></div>Cargando datos...</div></div>

<script>
const CSV_URL = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQ0FDT0-f1cDd2TxdZFvshSSaGt695yONwM5djelOS5gwmD53D3nO_HHLOw_InMd4lleLgR6_DD46Fo/pub?gid=2140392490&single=true&output=csv';

// Maintenance intervals (hours) - adjustable
const INTERVALS = {
  aceiteMotor: 250,
  aceiteHidraulico: 500,
  service: 500,
  engrase: 50,
  filtros: 200
};

let DATA = [];

function parseCSV(text) {
  const lines = text.trim().split('\n');
  if (lines.length < 2) return [];
  const headers = parseCSVLine(lines[0]);
  return lines.slice(1).map(line => {
    const vals = parseCSVLine(line);
    const obj = {};
    headers.forEach((h, i) => obj[h.trim()] = (vals[i] || '').trim());
    return obj;
  }).filter(r => r['Fecha']);
}

function parseCSVLine(line) {
  const result = []; let cur = ''; let inQ = false;
  for (let i = 0; i < line.length; i++) {
    if (line[i] === '"') inQ = !inQ;
    else if (line[i] === ',' && !inQ) { result.push(cur); cur = ''; }
    else cur += line[i];
  }
  result.push(cur);
  return result;
}

async function loadData() {
  const app = document.getElementById('app');
  app.innerHTML = '<div class="loading"><div class="spinner"></div>Cargando datos de maquinaria...</div>';
  try {
    const resp = await fetch(CSV_URL + '&_t=' + Date.now());
    const text = await resp.text();
    DATA = parseCSV(text);
    render();
  } catch(e) {
    app.innerHTML = '<div class="loading">Error: ' + e.message + '</div>';
  }
}

function daysSince(dateStr) {
  if (!dateStr) return null;
  const d = new Date(dateStr + 'T12:00:00');
  return Math.floor((new Date() - d) / 86400000);
}

function render() {
  const app = document.getElementById('app');
  if (!DATA.length) {
    app.innerHTML = '<div class="loading">Sin datos de maquinaria. Cargá registros desde el formulario.</div>';
    return;
  }

  // Aggregate by machine
  const maqs = {};
  DATA.forEach(r => {
    const m = r['Máquina'];
    if (!m) return;
    if (!maqs[m]) maqs[m] = {hs:0, comb:0, dias:new Set(), roturas:[], lastDate:'', paradas:0, lastRotura:null, ultimoOperador:''};
    const hn = parseFloat(r['Horas Netas']) || parseFloat(r['Horas Totales']) || 0;
    maqs[m].hs += hn;
    maqs[m].comb += parseInt(r['Combustible (lts)']) || 0;
    maqs[m].dias.add(r['Fecha']);
    if (r['Fecha'] > maqs[m].lastDate) { maqs[m].lastDate = r['Fecha']; maqs[m].ultimoOperador = r['Operador'] || ''; }
    if (r['Motivo Parada'] === 'Rotura mecánica') {
      maqs[m].roturas.push({fecha: r['Fecha'], obs: r['Observaciones'] || 'Sin detalle'});
      maqs[m].lastRotura = r['Fecha'];
    }
    if (r['Hubo Parada'] === 'SI') maqs[m].paradas++;
  });

  // Alerts
  let alertsHtml = '';
  const allAlerts = [];

  Object.entries(maqs).forEach(([name, m]) => {
    // Alert: machine not used in 3+ days
    const daysSinceUse = daysSince(m.lastDate);
    if (daysSinceUse > 3) {
      allAlerts.push({icon:'⚠️', text: name + ': sin uso hace ' + daysSinceUse + ' días (último: ' + m.lastDate + ')', type:'yel'});
    }
    // Alert: recent breakdown
    if (m.lastRotura && daysSince(m.lastRotura) <= 7) {
      const lastRot = m.roturas[m.roturas.length - 1];
      allAlerts.push({icon:'🔧', text: name + ': rotura reciente (' + lastRot.fecha + ') — ' + lastRot.obs, type:'red'});
    }
    // Alert: high breakdown rate
    if (m.roturas.length > 3) {
      allAlerts.push({icon:'🔴', text: name + ': ' + m.roturas.length + ' roturas acumuladas. Evaluar service preventivo.', type:'red'});
    }
    // Alert: maintenance estimate (every ~250hs suggest oil change)
    if (m.hs > 0 && m.hs % INTERVALS.aceiteMotor < 30 && m.hs > INTERVALS.aceiteMotor - 30) {
      allAlerts.push({icon:'🛢️', text: name + ': ' + Math.round(m.hs) + ' hs acumuladas. Verificar si corresponde cambio de aceite motor.', type:'yel'});
    }
  });

  if (allAlerts.length > 0) {
    alertsHtml = '<div class="card card-alert"><div class="sec"><span class="dot" style="background:var(--red)"></span>Alertas para logística</div>';
    allAlerts.forEach(a => {
      alertsHtml += '<div class="alert-box a-' + a.type + '"><span style="flex-shrink:0">' + a.icon + '</span><span>' + a.text + '</span></div>';
    });
    alertsHtml += '</div>';
  } else {
    alertsHtml = '<div class="card"><div class="alert-box a-grn"><span>✅</span><span>Sin alertas. Todas las máquinas operando normalmente.</span></div></div>';
  }

  // Machine cards
  let cardsHtml = '<div class="maq-grid">';
  Object.entries(maqs).sort((a,b) => b[1].hs - a[1].hs).forEach(([name, m]) => {
    const disp = m.dias.size > 0 ? (1 - m.roturas.length / m.dias.size) : 1;
    const hasRecentIssue = m.lastRotura && daysSince(m.lastRotura) <= 7;
    const cardClass = hasRecentIssue ? 'alert' : m.paradas > 5 ? 'warn' : '';
    const statusClass = hasRecentIssue ? 'st-bad' : disp >= 0.9 ? 'st-ok' : disp >= 0.7 ? 'st-warn' : 'st-bad';
    const statusText = hasRecentIssue ? 'Revisar' : disp >= 0.9 ? 'Operativa' : disp >= 0.7 ? 'Atención' : 'Crítica';

    // Estimate fuel consumption rate
    const combPerDay = m.dias.size > 0 ? (m.comb / m.dias.size) : 0;

    cardsHtml += '<div class="maq-card ' + cardClass + '">';
    cardsHtml += '<div class="maq-name">' + name + '<span class="maq-status ' + statusClass + '">' + statusText + '</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Horas acumuladas</span><span class="maq-val">' + Math.round(m.hs) + ' hs</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Días trabajados</span><span class="maq-val">' + m.dias.size + '</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Combustible total</span><span class="maq-val">' + m.comb.toLocaleString() + ' lts</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Consumo prom/día</span><span class="maq-val">' + (combPerDay > 0 ? Math.round(combPerDay) + ' lts' : '-') + '</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Roturas</span><span class="maq-val ' + (m.roturas.length > 3 ? 'danger' : m.roturas.length > 0 ? 'warn' : 'ok') + '">' + m.roturas.length + '</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Disponibilidad</span><span class="maq-val ' + (disp >= 0.9 ? 'ok' : disp >= 0.7 ? 'warn' : 'danger') + '">' + (disp*100).toFixed(0) + '%</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Último uso</span><span class="maq-val">' + m.lastDate + '</span></div>';
    cardsHtml += '<div class="maq-row"><span class="maq-label">Operador</span><span class="maq-val" style="font-family:var(--f)">' + m.ultimoOperador + '</span></div>';
    
    if (m.roturas.length > 0) {
      const lr = m.roturas[m.roturas.length - 1];
      cardsHtml += '<div style="margin-top:8px;padding:8px;background:var(--redd);border-radius:6px;font-size:11px">';
      cardsHtml += '<div style="font-weight:700;color:var(--red);margin-bottom:2px">Última rotura: ' + lr.fecha + '</div>';
      cardsHtml += '<div style="color:var(--txd)">' + lr.obs + '</div>';
      cardsHtml += '</div>';
    }
    cardsHtml += '</div>';
  });
  cardsHtml += '</div>';

  // Roturas history table
  let allRoturas = [];
  Object.entries(maqs).forEach(([name, m]) => {
    m.roturas.forEach(r => allRoturas.push({maquina: name, ...r}));
  });
  allRoturas.sort((a,b) => b.fecha.localeCompare(a.fecha));

  let tblHtml = '';
  if (allRoturas.length > 0) {
    tblHtml = '<div class="card" style="margin-top:14px"><div class="sec"><span class="dot" style="background:var(--red)"></span>Historial de roturas</div><div class="tbl-wrap"><table><thead><tr><th>Fecha</th><th>Máquina</th><th>Detalle</th></tr></thead><tbody>';
    allRoturas.slice(0, 20).forEach(r => {
      tblHtml += '<tr><td>' + r.fecha + '</td><td style="font-weight:600">' + r.maquina + '</td><td style="white-space:normal;max-width:300px">' + r.obs + '</td></tr>';
    });
    tblHtml += '</tbody></table></div></div>';
  }

  // Fuel summary
  let fuelHtml = '<div class="card" style="margin-top:14px"><div class="sec"><span class="dot" style="background:var(--acc)"></span>Consumo de combustible por máquina</div>';
  const maxComb = Math.max(...Object.values(maqs).map(m => m.comb), 1);
  Object.entries(maqs).sort((a,b) => b[1].comb - a[1].comb).forEach(([name, m]) => {
    const w = (m.comb / maxComb) * 100;
    fuelHtml += '<div style="margin-bottom:10px">';
    fuelHtml += '<div style="display:flex;justify-content:space-between;font-size:12px;margin-bottom:2px"><span style="font-weight:600">' + name + '</span><span style="font-family:var(--m);font-size:11px;color:var(--acc)">' + m.comb.toLocaleString() + ' lts</span></div>';
    fuelHtml += '<div class="comb-bar"><div class="comb-fill" style="width:' + w + '%;background:var(--acc)"></div></div>';
    fuelHtml += '</div>';
  });
  fuelHtml += '</div>';

  app.innerHTML = `
    <div style="font-size:11px;color:var(--txm);margin-bottom:12px;display:flex;gap:6px;align-items:center">
      📡 ${DATA.length} registros · Actualizado: ${new Date().toLocaleTimeString('es-AR')}
    </div>
    ${alertsHtml}
    <div class="card"><div class="sec"><span class="dot" style="background:var(--blu)"></span>Estado de maquinaria</div>${cardsHtml}</div>
    ${fuelHtml}
    ${tblHtml}
    <div class="footer">METCON S.A.S — Panel de Logística · Datos en tiempo real desde Google Sheets<br>
    <span style="color:var(--txm)">Intervalos sugeridos: aceite motor cada ${INTERVALS.aceiteMotor}hs · service general cada ${INTERVALS.service}hs</span></div>
  `;
}

loadData();
setInterval(loadData, 300000);
</script>
</body>
</html>
